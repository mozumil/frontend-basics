<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-div-01"><h1 class="h1">Muzammil Mirza</h1></div>
        <div class="header-div-02"><img class="profile-img" src="https://pfpmaker.com/images/tools/ai-avatars-3.webp" alt="profile-image"></div>
        <div class="header-div-03">
            <h2 class="h2">We will reply as soon as we can</h2>
            <h3 class="h3">Ask us anything, or shape your feedback</h3>
        </div>
    </header>

    <main>
        <div class="main-div-01"><p>22 May</p></div>
        <div class="main-div-02">Hey there! 👋 Want to connect with an <br> expert
            to talk through our <br>pricing?</div>
        <div class="main-div-03">
            <div class="main-div-03-01">Find more about pricing!</div>
            <div class="main-div-03-02">Talk to an expert!</div>
        </div>
    </main>

    <footer>
        <div class="footer-div-main">
            <div class="footer-div-01"><button><img class="attachment-img" src="paperclip.png" alt="attachment"></button></div>
            <div class="footer-div-02"><textarea name="typing-area" id="typing-area" placeholder="Type your message..."></textarea></div>
            <div class="footer-div-03"><img class="send-img" src="send.png" alt="send-png"></div>
        </div>
    </footer>
</body>
</html>
