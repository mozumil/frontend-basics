<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
        <div class="header-div-00">
            <div class="back-button-div"><button class="back-button"><img class="back-button-img" src="left-chevron.png" alt="left-arrow"></button></div>
        <div class="header-div-01"><h1 class="h1">Muzammil Mirza</h1></div>
        <div id="ghost-div"></div>
        </div>
        
        <div class="header-div-02"><img class="profile-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQVJK1sHzuzoKQpy8DJniDwJc6NR44wc-1Tlg&s" alt="profile-image"></div>
        <div class="header-div-03">
            <h2 class="h2">We will reply as soon as we can</h2>
            <h3 class="h3">Ask us anything, or shape your feedback</h3>
        </div>
    </header>

    <main>
        <div class="main-div-01"><p>22 May</p></div>
        <div class="chat-01">
            <img class="profile-img-02" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLXuM2b4djVbMt63hftHrWFFMeQmccyytKlQ&s" alt="profile-image-02">
            <div class="main-div-02">Hey there! 👋 Want to connect with an <br> expert
            to talk through our <br>pricing?</div>
        </div>
        
        <div class="main-div-03">
            <div class="main-div-03-01">Find more about pricing!</div>
            <div class="main-div-03-02">Talk to an expert!</div>
        </div>
    </main>

    <footer>
        <div class="footer-div-main">
            <div class="footer-div-01"><button class="attachment-button"><img class="attachment-img" src="paperclip.png" alt="attachment"></button></div>
            <input class="footer-div-02" type="text" placeholder="Type your message..."> 
            <div class="footer-div-03"><button class="send-button"><img class="send-img" src="send.png" alt="send-png"></button></div>
        </div>
    </footer>
    </div>
</body>
</html>
